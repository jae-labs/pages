name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'review' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://justanother.engineer' || steps.deploy.outputs.deployment-url }}

    steps:
      - name: Honeycomb Buildevents
        uses: honeycombio/gha-buildevents@1dad608d8534ec0fdf57e7503ceb8256b5ddc531 # ratchet:honeycombio/gha-buildevents@v4.0.0
        with:
          apikey: ${{ secrets.HONEYCOMB_API_KEY }}
          dataset: gha-builds
          status: ${{ job.status }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # ratchet:pnpm/action-setup@v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: "22.12.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          SITE_URL: https://justanother.engineer
          SITE_BASE: /
          PUBLIC_POSTHOG_KEY: ${{ secrets.PAGES_PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PAGES_PUBLIC_POSTHOG_HOST }}
          PUBLIC_SENTRY_DSN: ${{ secrets.PAGES_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.PAGES_SENTRY_AUTH_TOKEN }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PAGES_PUBLIC_TURNSTILE_SITE_KEY }}
        run: pnpm build

      - name: Validate runtime secrets
        env:
          NVN_LLM_TOKEN: ${{ secrets.PAGES_NVN_LLM_TOKEN }}
        run: test -n "$NVN_LLM_TOKEN"

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # ratchet:cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            printf '%s' "$NVN_LLM_TOKEN" | npx --no-install wrangler pages secret put NVN_LLM_TOKEN --project-name=jae-pages --env="$CLOUDFLARE_PAGES_ENV"
            printf '%s' "$PUBLIC_SENTRY_DSN" | npx --no-install wrangler pages secret put PUBLIC_SENTRY_DSN --project-name=jae-pages --env="$CLOUDFLARE_PAGES_ENV"
            if [ -n "$TURNSTILE_SECRET_KEY" ]; then printf '%s' "$TURNSTILE_SECRET_KEY" | npx --no-install wrangler pages secret put TURNSTILE_SECRET_KEY --project-name=jae-pages --env="$CLOUDFLARE_PAGES_ENV"; fi
          command: pages deploy dist --project-name=jae-pages
        env:
          CLOUDFLARE_PAGES_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
          NVN_LLM_TOKEN: ${{ secrets.PAGES_NVN_LLM_TOKEN }}
          PUBLIC_SENTRY_DSN: ${{ secrets.PAGES_PUBLIC_SENTRY_DSN }}
          TURNSTILE_SECRET_KEY: ${{ secrets.PAGES_TURNSTILE_SECRET_KEY }}

      - name: Post Preview URL to PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deployment-url != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # ratchet:actions/github-script@v9.0.0
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Cloudflare Pages Preview Deployment is ready!**\n\nPreview URL: [${process.env.DEPLOYMENT_URL}](${process.env.DEPLOYMENT_URL})`
            })
